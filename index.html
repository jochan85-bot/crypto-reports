<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>📈 MacTrader · Crypto V18 Live</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  :root {
    --bg: #0b0f17;
    --panel: #131a26;
    --border: #1f2a3a;
    --text: #e6edf3;
    --muted: #8b97a7;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --amber: #f59e0b;
    --purple: #a855f7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Pretendard",
                 "Apple SD Gothic Neo", Helvetica, Arial, sans-serif;
    font-size: 14px;
  }
  header {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  h1 { margin: 0; font-size: 16px; font-weight: 600; }
  h1 small { color: var(--muted); font-weight: 400; margin-left: 8px; font-size: 12px; }
  .status {
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    font-size: 13px;
  }
  .pill {
    padding: 4px 10px; border-radius: 999px;
    background: var(--panel); border: 1px solid var(--border);
    font-weight: 500;
  }
  .pill.zone-STRONG_BUY  { background: rgba(34,197,94,.18);  color: #4ade80; border-color: rgba(34,197,94,.4); }
  .pill.zone-BUY         { background: rgba(34,197,94,.10);  color: #86efac; border-color: rgba(34,197,94,.3); }
  .pill.zone-HOLD        { background: rgba(139,151,167,.15); color: var(--muted); }
  .pill.zone-SELL        { background: rgba(245,158,11,.15); color: #fbbf24; border-color: rgba(245,158,11,.4); }
  .pill.zone-STRONG_SELL { background: rgba(239,68,68,.18);  color: #fca5a5; border-color: rgba(239,68,68,.4); }
  .muted { color: var(--muted); }
  main { padding: 12px; max-width: 1400px; margin: 0 auto; }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; margin-bottom: 14px;
  }
  .card h2 { margin: 0 0 10px; font-size: 14px; font-weight: 600; }
  #priceChart, #scoreChart { width: 100%; height: 420px; touch-action: pan-y; }
  #scoreChart { height: 280px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  @media (max-width: 640px) {
    table { font-size: 12px; min-width: 560px; }
    th, td { padding: 6px 8px; }
  }
  th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  td.right, th.right { text-align: right; font-variant-numeric: tabular-nums; }
  .zone-cell { font-weight: 600; }
  .zone-STRONG_BUY  { color: #4ade80; }
  .zone-BUY         { color: #86efac; }
  .zone-HOLD        { color: var(--muted); }
  .zone-SELL        { color: #fbbf24; }
  .zone-STRONG_SELL { color: #fca5a5; }
  .empty { color: var(--muted); padding: 24px; text-align: center; }
  footer { color: var(--muted); font-size: 12px; padding: 16px; text-align: center; }
  footer a { color: var(--blue); text-decoration: none; }
</style>
</head>
<body>
  <header>
    <h1>📈 MacTrader · Crypto V18 <small>유포리아+시간차 매도 · 강력매수 max+그룹화</small></h1>
    <div class="status" id="statusBar">
      <span class="muted">데이터 로드 중…</span>
    </div>
  </header>

  <main>
    <div class="card">
      <h2>가격 · 시그널 마커</h2>
      <div id="priceChart"></div>
    </div>

    <div class="card">
      <h2>연속 통합 점수 (V18) <span class="muted" style="font-weight:400; font-size:12px;">
        — 매수 컷 +6.5 · 강력매수 +9.5 · 매도 컷 −6.0 · 강력매도 −9.0 · 유포리아 매도 임계 −4.5
      </span></h2>
      <div id="scoreChart"></div>
    </div>

    <div class="card">
      <h2>시그널 로그 <span class="muted" style="font-weight:400; font-size:12px;">— zone 변경 이벤트</span></h2>
      <div id="signalLog" class="table-wrap"></div>
    </div>

    <div class="card">
      <h2>일일 스냅샷 <span class="muted" style="font-weight:400; font-size:12px;">— 최근 30일</span></h2>
      <div id="dailyTable" class="table-wrap"></div>
    </div>
  </main>

  <footer>
    데이터 갱신: 매일 09:00 KST · <a href="data/history.json">history.json</a> ·
    <a href="https://github.com/jochan85-bot/crypto-reports">GitHub</a>
  </footer>

<script>
const CFG = {
  SBUY_ON:  9.5, BUY_ON:  6.5,
  SELL_ON: -6.0, SSELL_ON: -9.0,
};
const ZONE_LABEL = {
  STRONG_BUY:  "🟢 강력매수",
  BUY:         "🟢 분할매수",
  HOLD:        "⚪ 관망",
  SELL:        "🟠 분할매도",
  STRONG_SELL: "🔴 강력매도",
};
const ZONE_COLOR = {
  STRONG_BUY:  "#22c55e",
  BUY:         "#86efac",
  HOLD:        "#8b97a7",
  SELL:        "#f59e0b",
  STRONG_SELL: "#ef4444",
};

const PLOTLY_LAYOUT_BASE = {
  paper_bgcolor: "#131a26",
  plot_bgcolor:  "#0b0f17",
  font: { color: "#e6edf3", family: "-apple-system, BlinkMacSystemFont, Pretendard, sans-serif", size: 12 },
  margin: { l: 60, r: 60, t: 30, b: 50 },
  hovermode: "x unified",
  dragmode: "pan",
  legend: { orientation: "h", y: -0.2 },
  xaxis: {
    gridcolor: "#1f2a3a", linecolor: "#1f2a3a",
    rangeslider: { visible: false },
    rangeselector: {
      bgcolor: "#0b0f17", activecolor: "#3b82f6", bordercolor: "#1f2a3a",
      buttons: [
        { count: 7,   label: "1주",  step: "day",   stepmode: "backward" },
        { count: 1,   label: "1달",  step: "month", stepmode: "backward" },
        { count: 6,   label: "6달",  step: "month", stepmode: "backward" },
        { count: 1,   label: "1년",  step: "year",  stepmode: "backward" },
        { count: 5,   label: "5년",  step: "year",  stepmode: "backward" },
        { step: "all", label: "전체" },
      ]
    }
  },
};

function fmtKRW(n) {
  if (n == null) return "-";
  if (n >= 1e8) return (n / 1e8).toFixed(2) + "억";
  if (n >= 1e4) return (n / 1e4).toFixed(0) + "만";
  return n.toLocaleString();
}

function renderStatus(latest) {
  const el = document.getElementById("statusBar");
  if (!latest) { el.innerHTML = '<span class="muted">데이터 없음</span>'; return; }
  const zone = latest.zone || "HOLD";
  // V18: score_v18 우선, 유포리아 및 V18 신호 표시
  const sc = latest.score_v18 != null ? latest.score_v18 : latest.score;
  const eu = latest.euphoria_v18;
  // 유포리아: 높을수록 더 과열 → 매도 임계 접근 경보 (임계 이상이면 빨강)
  const euTag = eu != null
    ? `<span title="유포리아 (매도 임계 ≥4.5)" style="color:${eu>=4.5?'#ef4444':eu>=3?'#f59e0b':'#8b97a7'}"><span class="muted">유포리아</span> ${eu>=0?'+':''}${eu.toFixed(1)}</span>`
    : '';
  const sellTag = latest.sell_signal_v18 ? '<span style="color:#ef4444">🔻매도신호</span>' : '';
  const sbTag   = latest.strong_buy_v18  ? '<span style="color:#fbbf24">★강력매수</span>' : '';
  el.innerHTML = `
    <span class="pill zone-${zone}">${ZONE_LABEL[zone] || zone}</span>
    <span><span class="muted">점수(V18)</span> <b>${sc >= 0 ? "+" : ""}${(+sc).toFixed(1)}</b></span>
    <span><span class="muted">BTC</span> ${fmtKRW(latest.btc_krw)} KRW</span>
    <span><span class="muted">ETH</span> ${fmtKRW(latest.eth_krw)} KRW</span>
    ${euTag}
    ${sellTag}
    ${sbTag}
    <span class="muted">📅 ${latest.zone_since} 시작 (${latest.zone_days}일째)</span>
    <span class="muted">· 갱신 ${latest.date}</span>
  `;
}

function renderPriceChart(rows) {
  const x      = rows.map(r => r.date);
  const btc    = rows.map(r => r.btc_krw);
  const eth    = rows.map(r => r.eth_krw);
  // zone 변경 마커
  const changes = rows.filter(r => r.zone_changed);
  const markers = {
    x: changes.map(r => r.date),
    y: changes.map(r => r.btc_krw),
    text: changes.map(r => `${ZONE_LABEL[r.zone] || r.zone}<br>점수 ${r.score >= 0 ? "+" : ""}${(+r.score).toFixed(1)}`),
    mode: "markers+text",
    type: "scatter",
    name: "Zone 변경",
    marker: {
      size: 14,
      color: changes.map(r => ZONE_COLOR[r.zone] || "#8b97a7"),
      symbol: "diamond",
      line: { color: "#0b0f17", width: 2 },
    },
    textposition: "top center",
    textfont: { size: 10, color: "#e6edf3" },
    hovertemplate: "%{x}<br><b>%{text}</b><extra></extra>",
  };
  // V18 매도 신호 (빨강 삼각 아래 ▼)
  const sellDays = rows.filter(r => r.sell_signal_v18);
  const sellMarker = sellDays.length ? {
    x: sellDays.map(r => r.date),
    y: sellDays.map(r => r.btc_krw),
    mode: "markers", type: "scatter", name: "V18 매도▼",
    marker: { color: "#ef4444", size: 12, symbol: "triangle-down", line: { color: "#0b0f17", width: 1 } },
    hovertemplate: "%{x}<br><b>V18 매도 신호</b><extra></extra>",
  } : null;
  // V18 강력매수 (노란 별 ★)
  const sbDays = rows.filter(r => r.strong_buy_v18);
  const sbMarker = sbDays.length ? {
    x: sbDays.map(r => r.date),
    y: sbDays.map(r => r.btc_krw),
    mode: "markers", type: "scatter", name: "V18 강력매수★",
    marker: { color: "#fbbf24", size: 14, symbol: "star", line: { color: "#0b0f17", width: 1 } },
    hovertemplate: "%{x}<br><b>V18 강력매수</b><extra></extra>",
  } : null;
  const traces = [
    { x, y: btc, name: "BTC (KRW)", type: "scatter", mode: "lines", line: { color: "#f59e0b", width: 2 }, yaxis: "y" },
    { x, y: eth, name: "ETH (KRW)", type: "scatter", mode: "lines", line: { color: "#3b82f6", width: 1.5 }, yaxis: "y2" },
    markers,
    sellMarker,
    sbMarker,
  ].filter(Boolean);
  const layout = Object.assign({}, PLOTLY_LAYOUT_BASE, {
    yaxis:  { title: "BTC (KRW)", gridcolor: "#1f2a3a", linecolor: "#1f2a3a", side: "left" },
    yaxis2: { title: "ETH (KRW)", gridcolor: "transparent", linecolor: "#1f2a3a", overlaying: "y", side: "right" },
  });
  Plotly.newPlot("priceChart", traces, layout, {
    responsive: true, displaylogo: false, displayModeBar: false, scrollZoom: true,
  });
}

function renderScoreChart(rows) {
  const x = rows.map(r => r.date);
  // V18 점수 우선, 없으면 구버전 fallback
  const s = rows.map(r => r.score_v18 != null ? r.score_v18 : r.score);
  const eu = rows.map(r => r.euphoria_v18 != null ? r.euphoria_v18 : null);
  const hasEu = eu.some(v => v != null);

  const sellDays = rows.filter(r => r.sell_signal_v18);
  const sbDays   = rows.filter(r => r.strong_buy_v18);

  const traces = [
    {
      x, y: s, name: "통합 점수 (V18)", type: "scatter", mode: "lines",
      line: { color: "#a855f7", width: 2 },
      fill: "tozeroy", fillcolor: "rgba(168,85,247,0.10)",
      yaxis: "y",
    },
    hasEu ? {
      x, y: eu, name: "유포리아 (V18)", type: "scatter", mode: "lines",
      line: { color: "#ef4444", width: 1.5, dash: "dot" },
      yaxis: "y2",
      hovertemplate: "%{x}<br>유포리아 %{y:.2f}<extra></extra>",
    } : null,
    sellDays.length ? {
      x: sellDays.map(r => r.date),
      y: sellDays.map(r => +(r.score_v18 != null ? r.score_v18 : r.score)),
      mode: "markers", type: "scatter", name: "V18 매도▼",
      marker: { color: "#ef4444", size: 10, symbol: "triangle-down" },
      hovertemplate: "%{x}<br>V18 매도 신호<extra></extra>",
    } : null,
    sbDays.length ? {
      x: sbDays.map(r => r.date),
      y: sbDays.map(r => +(r.score_v18 != null ? r.score_v18 : r.score)),
      mode: "markers", type: "scatter", name: "V18 강력매수★",
      marker: { color: "#fbbf24", size: 12, symbol: "star" },
      hovertemplate: "%{x}<br>V18 강력매수<extra></extra>",
    } : null,
  ].filter(Boolean);
  const shapes = [
    { type: "line", xref: "paper", yref: "y", x0: 0, x1: 1, y0: CFG.SBUY_ON,  y1: CFG.SBUY_ON,  line: { color: "#22c55e", width: 1, dash: "dash" } },
    { type: "line", xref: "paper", yref: "y", x0: 0, x1: 1, y0: CFG.BUY_ON,   y1: CFG.BUY_ON,   line: { color: "#86efac", width: 1, dash: "dot" } },
    { type: "line", xref: "paper", yref: "y", x0: 0, x1: 1, y0: 0,            y1: 0,            line: { color: "#8b97a7", width: 1 } },
    { type: "line", xref: "paper", yref: "y", x0: 0, x1: 1, y0: CFG.SELL_ON,  y1: CFG.SELL_ON,  line: { color: "#f59e0b", width: 1, dash: "dot" } },
    { type: "line", xref: "paper", yref: "y", x0: 0, x1: 1, y0: CFG.SSELL_ON, y1: CFG.SSELL_ON, line: { color: "#ef4444", width: 1, dash: "dash" } },
    // V18 유포리아 매도 임계 (y2 축)
    { type: "line", xref: "paper", yref: "y2", x0: 0, x1: 1, y0: 4.5, y1: 4.5, line: { color: "#ef4444", width: 1, dash: "dash" } },
  ];
  const annotations = [
    { xref: "paper", yref: "y", x: 1.01, y: CFG.SBUY_ON,  text: "+9.5", showarrow: false, font: { color: "#22c55e", size: 10 } },
    { xref: "paper", yref: "y", x: 1.01, y: CFG.BUY_ON,   text: "+6.5", showarrow: false, font: { color: "#86efac", size: 10 } },
    { xref: "paper", yref: "y", x: 1.01, y: CFG.SELL_ON,  text: "-6.0", showarrow: false, font: { color: "#f59e0b", size: 10 } },
    { xref: "paper", yref: "y", x: 1.01, y: CFG.SSELL_ON, text: "-9.0", showarrow: false, font: { color: "#ef4444", size: 10 } },
  ];
  const layout = Object.assign({}, PLOTLY_LAYOUT_BASE, {
    yaxis:  { title: "점수", gridcolor: "#1f2a3a", linecolor: "#1f2a3a", range: [-13, 13] },
    yaxis2: { title: "유포리아", gridcolor: "transparent", linecolor: "#1f2a3a", overlaying: "y", side: "right", range: [-6, 8] },
    shapes: shapes,
    annotations: annotations,
  });
  Plotly.newPlot("scoreChart", traces, layout, {
    responsive: true, displaylogo: false, displayModeBar: false, scrollZoom: true,
  });
}

function renderSignalLog(rows) {
  const changes = rows.filter(r => r.zone_changed).slice().reverse();
  const el = document.getElementById("signalLog");
  if (!changes.length) {
    el.innerHTML = '<div class="empty">아직 zone 변경 이벤트 없음. 데이터가 누적되면 여기 표시됩니다.</div>';
    return;
  }
  let html = '<table><thead><tr><th>날짜</th><th>Zone</th><th class="right">V18점수</th><th class="right">BTC</th><th class="right">ETH</th><th>비고</th></tr></thead><tbody>';
  for (const r of changes) {
    const sc = r.score_v18 != null ? r.score_v18 : r.score;
    html += `<tr>
      <td>${r.date}</td>
      <td class="zone-cell zone-${r.zone}">${ZONE_LABEL[r.zone] || r.zone}</td>
      <td class="right">${sc >= 0 ? "+" : ""}${(+sc).toFixed(1)}</td>
      <td class="right">${fmtKRW(r.btc_krw)}</td>
      <td class="right">${fmtKRW(r.eth_krw)}</td>
      <td class="muted">${r.allocation || (r.gate || "-")}</td>
    </tr>`;
  }
  html += "</tbody></table>";
  el.innerHTML = html;
}

function renderDailyTable(rows) {
  const recent = rows.slice(-30).reverse();
  const el = document.getElementById("dailyTable");
  if (!recent.length) { el.innerHTML = '<div class="empty">데이터 없음</div>'; return; }
  // V18: 유포리아 / 매도 / 강력매수 컬럼
  let html = '<table><thead><tr>' +
    '<th>날짜</th><th>Zone</th>' +
    '<th class="right">V18점수</th>' +
    '<th class="right">BTC</th><th class="right">ETH</th>' +
    '<th class="right">NUPL</th><th class="right">MVRVz</th><th class="right">F&G</th>' +
    '<th class="right" title="유포리아 (≥4.5이면 매도구간)">유포리아</th>' +
    '<th class="right" title="V18 매도 신호">매도</th>' +
    '<th class="right" title="V18 강력매수">★</th>' +
    '</tr></thead><tbody>';
  const boolCell = (v, label, color) => v === true
    ? `<td class="right" style="color:${color}"><b>${label}</b></td>`
    : '<td class="right muted">·</td>';
  for (const r of recent) {
    const m = r.metrics || {};
    const sc = r.score_v18 != null ? r.score_v18 : r.score;
    const eu = r.euphoria_v18;
    const euColor = eu != null && eu >= 4.5 ? '#ef4444' : (eu != null && eu >= 3 ? '#f59e0b' : '#e6edf3');
    html += `<tr>
      <td>${r.date}</td>
      <td class="zone-cell zone-${r.zone}">${(ZONE_LABEL[r.zone] || r.zone).replace(/^[\u{1F300}-\u{1FAFF}]\s*/u, "")}</td>
      <td class="right">${sc >= 0 ? "+" : ""}${(+sc).toFixed(1)}</td>
      <td class="right">${fmtKRW(r.btc_krw)}</td>
      <td class="right">${fmtKRW(r.eth_krw)}</td>
      <td class="right">${m.btc_nupl != null ? (+m.btc_nupl).toFixed(3) : "-"}</td>
      <td class="right">${m.btc_mvrv_z != null ? (+m.btc_mvrv_z).toFixed(2) : "-"}</td>
      <td class="right">${m.fng != null ? m.fng : "-"}</td>
      <td class="right" style="color:${euColor}">${eu != null ? ((eu>=0?'+':'') + eu.toFixed(1)) : "-"}</td>
      ${boolCell(r.sell_signal_v18, '▼', '#ef4444')}
      ${boolCell(r.strong_buy_v18,  '★', '#fbbf24')}
    </tr>`;
  }
  html += "</tbody></table>";
  el.innerHTML = html;
}

// ── 차트 x축 연동 (핀치줌 / 범위선택 공유) ─────────────────────────────
function bindChartSync() {
  let _syncing = false;

  function syncTo(targetId, eventData) {
    if (_syncing) return;
    _syncing = true;
    try {
      if (eventData["xaxis.autorange"] === true) {
        // "전체" 버튼: autorange 복원
        Plotly.relayout(targetId, { "xaxis.autorange": true });
      } else if (eventData["xaxis.range[0]"] !== undefined) {
        Plotly.relayout(targetId, {
          "xaxis.range[0]": eventData["xaxis.range[0]"],
          "xaxis.range[1]": eventData["xaxis.range[1]"],
          "xaxis.autorange": false,
        });
      } else if (Array.isArray(eventData["xaxis.range"])) {
        Plotly.relayout(targetId, {
          "xaxis.range": eventData["xaxis.range"],
          "xaxis.autorange": false,
        });
      }
    } finally {
      setTimeout(() => { _syncing = false; }, 80);
    }
  }

  document.getElementById("priceChart").on("plotly_relayout", e => syncTo("scoreChart", e));
  document.getElementById("scoreChart").on("plotly_relayout", e => syncTo("priceChart", e));
}

// ── 수동 핀치줌 핸들러 (iOS Safari 부트·document 레벨 캐처) ─────────────────
const _pinchState = {
  chartId: null,
  startDist: 0,
  startMidData: 0,
  startRange: null,
};

function _getChartInfo(chartId, clientX) {
  const gd = document.getElementById(chartId);
  if (!gd || !gd._fullLayout) return null;
  const xaxis = gd._fullLayout.xaxis;
  if (!xaxis || !xaxis._length) return null;
  const bb = gd.getBoundingClientRect();
  const left = bb.left + xaxis._offset;
  const pxInPlot = clientX - left;
  return {
    left, width: xaxis._length,
    rect: bb,
    pxToData: (px) => {
      const v = xaxis.p2d(px);
      return (typeof v === "number") ? v : new Date(v).getTime();
    },
    pxInPlot,
    range: xaxis.range.map(v => (typeof v === "number" ? v : new Date(v).getTime())),
  };
}

function _findChartUnderTouch(t0, t1) {
  // 두 터치 중 하나용 차트 div가 어디인지 판단
  const midX = (t0.clientX + t1.clientX) / 2;
  const midY = (t0.clientY + t1.clientY) / 2;
  for (const id of ["priceChart", "scoreChart"]) {
    const el = document.getElementById(id);
    if (!el) continue;
    const bb = el.getBoundingClientRect();
    if (midX >= bb.left && midX <= bb.right && midY >= bb.top && midY <= bb.bottom) {
      return id;
    }
  }
  return null;
}

// 차트 요소 내부에서 시작된 터치만 가로채기 (외부 페이지 스크롤은 그대로 허용)
function _isInsideChart(e) {
  const els = [document.getElementById("priceChart"), document.getElementById("scoreChart")];
  return els.some(el => el && el.contains(e.target));
}

// document 레벨에서 다중 터치 캡처 (Plotly/iOS 보다 먼저) — 단, 차트 내부 한정
document.addEventListener("touchstart", e => {
  if (!_isInsideChart(e)) return;        // 차트 외부면 무시 (페이지 스크롤 허용)
  if (e.touches.length !== 2) return;
  const t0 = e.touches[0], t1 = e.touches[1];
  const chartId = _findChartUnderTouch(t0, t1);
  if (!chartId) return;
  const midScreenX = (t0.clientX + t1.clientX) / 2;
  const info = _getChartInfo(chartId, midScreenX);
  if (!info) return;
  _pinchState.chartId = chartId;
  _pinchState.startDist = Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY);
  _pinchState.startMidData = info.pxToData(info.pxInPlot);
  _pinchState.startRange = info.range;
  e.preventDefault();
}, { passive: false, capture: true });

document.addEventListener("touchmove", e => {
  if (!_isInsideChart(e)) return;        // 차트 외부면 preventDefault 없이 패스 (스크롤 허용)
  if (e.touches.length !== 2 || !_pinchState.startRange) return;
  const t0 = e.touches[0], t1 = e.touches[1];
  const dist = Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY);
  if (dist < 10 || _pinchState.startDist < 10) return;
  const scale = _pinchState.startDist / dist;
  const [r0, r1] = _pinchState.startRange;
  const span = r1 - r0;
  const newSpan = Math.max(span * scale, 86400000);
  const leftFrac = (_pinchState.startMidData - r0) / span;
  const newR0 = _pinchState.startMidData - leftFrac * newSpan;
  const newR1 = newR0 + newSpan;
  Plotly.relayout(_pinchState.chartId, {
    "xaxis.range[0]": new Date(newR0).toISOString(),
    "xaxis.range[1]": new Date(newR1).toISOString(),
    "xaxis.autorange": false,
  });
  e.preventDefault();
}, { passive: false, capture: true });

document.addEventListener("touchend", e => {
  if (e.touches.length < 2) {
    _pinchState.chartId = null;
    _pinchState.startRange = null;
  }
}, { capture: true });

// iOS Safari gesture 이벤트는 차트 영역에서만 차단 (페이지 줌은 viewport user-scalable=no로 처리)
for (const id of ["priceChart", "scoreChart"]) {
  const el = document.getElementById(id);
  if (!el) continue;
  el.addEventListener("gesturestart",  e => e.preventDefault(), { passive: false });
  el.addEventListener("gesturechange", e => e.preventDefault(), { passive: false });
  el.addEventListener("gestureend",    e => e.preventDefault(), { passive: false });
}

function bindPinchZoom(chartId) { /* document-level 처리, 개별 바인딩 불필요 */ }

async function main() {
  let rows = [];
  try {
    const r = await fetch("data/history.json?t=" + Date.now(), { cache: "no-store" });
    rows = await r.json();
  } catch (e) {
    document.getElementById("statusBar").innerHTML = '<span style="color:#ef4444">데이터 로드 실패</span>';
    return;
  }
  rows.sort((a, b) => a.date < b.date ? -1 : 1);
  const latest = rows.length ? rows[rows.length - 1] : null;
  renderStatus(latest);
  if (rows.length < 2) {
    const msg = rows.length === 0
      ? '아직 데이터 없음. 매일 09:00 KST cron이 첫 데이터를 추가하면 차트가 그려집니다.'
      : '데이터 누적 중 (1/2일). 내일 09:00 KST 이후 차트가 그려집니다.';
    for (const id of ["priceChart", "scoreChart"]) {
      document.getElementById(id).innerHTML = `<div class="empty">${msg}</div>`;
    }
    renderSignalLog(rows); renderDailyTable(rows);
    return;
  }
  renderPriceChart(rows);
  renderScoreChart(rows);
  bindChartSync();
  bindPinchZoom("priceChart");
  bindPinchZoom("scoreChart");
  renderSignalLog(rows);
  renderDailyTable(rows);
}
main();
</script>
